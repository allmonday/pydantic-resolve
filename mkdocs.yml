site_name: Pydantic-resolve
site_description: "a business model friendly data orchestration tool, simple way to implement the core concept of clean architecture."
site_url: https://allmonday.github.io/pydantic-resolve
site_author: tangkikodo
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    # - navigation.instant
    # - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - content.links.target_blank

repo_name: allmonday/pydantic-resolve
repo_url: https://github.com/allmonday/pydantic-resolve
edit_uri: ""

# nav:
#   - Quick Start:
#       - Install: ./v1/index.md
#       - Let's start: ./v1/about.md
#       - Dataloader: ./v1/dataloader.md
#       - Inheritance: ./v1/inherit.md
#       - Tree: ./v1/tree.md
#       - Philosophy: ./v1/philosophy.md
#   - Reference:
#       - API: ./v1/reference_api.md
#   - Change log:
#       - pydantic-resolve: ./v1/changelog.md

nav:
  - Guide:
    - Overview: ./index.md
    - Quick Start: ./quick_start.md
    - Core API: ./core_api.md
    - Post Processing: ./post_processing.md
    - Cross-Layer Data Flow: ./cross_layer_data_flow.md
    - ERD and AutoLoad: ./erd_and_autoload.md
    - GraphQL and MCP: ./graphql_and_mcp.md
  - Reference:
    - Reference Bridge: ./reference_bridge.md
    - Migration Guide: ./migration.md
    - Change log: ./changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.superfences

plugins:
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
          link: "/pydantic-resolve/"
        - locale: zh
          name: 中文
          build: true
          link: "/pydantic-resolve/zh/"
          nav_translations:
            Guide: "指南"
            Overview: "总览"
            Quick Start: "快速开始"
            Core API: "核心 API"
            Post Processing: "后处理"
            Cross-Layer Data Flow: "跨层数据流"
            ERD and AutoLoad: "ERD 与 AutoLoad"
            GraphQL and MCP: "GraphQL 与 MCP"
            Reference Bridge: "延伸阅读"
            Use cases: "应用场景"
            Why create it: "为何写个新的库?"
            Schema first: "定义数据结构"
            Features: "功能介绍"
            Dataloader: "数据加载器"
            Inherit and reuse: "继承和复用"
            Expose and collect: "提供和收集"
            Reference: "文档"
            Connect to UI: "连接UI"
            GraphQL Support: "GraphQL 支持"
            ERD Driven Pattern: "ERD 驱动开发"
            Change log: "变更记录"
            Migration Guide: "迁移指南"
            Install: "安装"
            Let's start: "开始"
            Inheritance: "继承"
            Philosophy: "迷思"
            Others: "其他"
            Install: "安装"

extra:
  analytics:
    provider: google
    property: G-9P2E638G4H
