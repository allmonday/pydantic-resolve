site_name: Pydantic-resolve
site_description: "Declarative data assembly for Pydantic — eliminate N+1 queries with minimal code."
site_url: https://allmonday.github.io/pydantic-resolve
site_author: tangkikodo
theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - header.autohide
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.links.target_blank
  font:
    text: Roboto
    code: Roboto Mono

repo_name: allmonday/pydantic-resolve
repo_url: https://github.com/allmonday/pydantic-resolve
edit_uri: ""

nav:
  - Guide:
    - Overview: ./index.md
    - Quick Start: ./quick_start.md
    - Core API: ./core_api.md
    - Post Processing: ./post_processing.md
    - Cross-Layer Data Flow: ./cross_layer_data_flow.md
    - ERD and AutoLoad: ./erd_and_autoload.md
  - Advanced:
    - DataLoader Deep Dive: ./dataloader_deep_dive.md
    - ERD with DefineSubset: ./erd_define_subset.md
    - ORM Integration: ./orm_integration.md
    - FastAPI Integration: ./fastapi_integration.md
    - GraphQL Guide: ./graphql_guide.md
    - MCP Service: ./mcp_service.md
    - Voyager Visualization: ./voyager_guide.md
  - API Reference:
    - Resolver: ./api_resolver.md
    - DataLoader Utilities: ./api_dataloader.md
    - Cross-Layer Annotations: ./api_cross_layer.md
    - ER Diagram: ./api_erd.md
    - DefineSubset: ./api_subset.md
    - GraphQL API: ./api_graphql.md
    - MCP API: ./api_mcp.md
  - Reference:
    - Migration Guide: ./migration.md
    - Changelog: ./changelog.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.superfences

plugins:
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
          link: "/pydantic-resolve/"
        - locale: zh
          name: 中文
          build: true
          link: "/pydantic-resolve/zh/"
          nav_translations:
            Guide: "指南"
            Advanced: "进阶"
            API Reference: "API 参考"
            Reference: "参考"
            Overview: "总览"
            Quick Start: "快速开始"
            Core API: "核心 API"
            Post Processing: "后处理"
            Cross-Layer Data Flow: "跨层数据流"
            ERD and AutoLoad: "ERD 与 AutoLoad"
            DataLoader Deep Dive: "DataLoader 深入"
            ERD with DefineSubset: "ERD 与 DefineSubset"
            ORM Integration: "ORM 集成"
            FastAPI Integration: "FastAPI 集成"
            GraphQL Guide: "GraphQL 指南"
            MCP Service: "MCP 服务"
            Voyager Visualization: "Voyager 可视化"
            Resolver: "Resolver"
            DataLoader Utilities: "DataLoader 工具"
            Cross-Layer Annotations: "跨层注解"
            ER Diagram: "ER 图"
            DefineSubset: "DefineSubset"
            GraphQL API: "GraphQL API"
            MCP API: "MCP API"
            Change log: "变更记录"
            Migration Guide: "迁移指南"

extra:
  analytics:
    provider: google
    property: G-9P2E638G4H

extra_css:
  - stylesheets/extra.css
